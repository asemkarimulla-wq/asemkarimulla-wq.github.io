  <p>
    XinZhang(Elena) is positioned as a cross-domain practitioner spanning intelligent driving products, physical retail operations, and AI-native product experimentation.
  </p>
  <p>
    Research and practice interests include: (1) AI Agentic Workflows, including multi-agent collaboration, RAG logic, and LLM-based task decomposition; (2) intelligent driving systems, including data annotation platform refactoring, vehicle calibration workflow optimization, and algorithm-support integration; (3) data-driven growth powered by LLMs for cross-border marketing, short-video SOP pipelines, and private-domain conversion logic; and (4) agile AI development toolchains centered on Cursor, Firecrawl, DeepSeek, and Gemini.
  </p>
  <p>
    Professional profile: a senior intelligent driving product manager with two years of platform refactoring and 0-1 product delivery experience; an operations lead responsible for market growth and content strategy for physical stores; and an AI Vibe Coding independent builder focused on interesting application prototypes and SOP automation frameworks.
  </p>

